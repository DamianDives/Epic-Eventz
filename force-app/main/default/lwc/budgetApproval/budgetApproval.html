<template>
    <div class="approval-container">
        <div class="approval-header">
            <h1>Budget Approvals</h1>
            <p>Manage event budget submissions and approvals</p>
        </div>

        <template if:false={hasFinanceAccess}>
            <div class="access-denied">
                <span class="denied-icon">🔒</span>
                <h3>Finance Access Required</h3>
                <p>Only users with the Finance Manager permission can approve or reject budgets.</p>
            </div>
        </template>

        <template if:true={hasFinanceAccess}>
            <!-- Pending Approvals -->
            <div class="section">
                <h2 class="section-title">Pending Approvals ({pendingCount})</h2>
                <template if:true={pendingEvents}>
                    <div class="approval-list">
                        <template for:each={pendingEvents} for:item="evt">
                            <div key={evt.Id} class="approval-card">
                                <div class="card-left">
                                    <h3>{evt.Name}</h3>
                                    <span class="card-type">{evt.Event_Type__c}</span>
                                    <span class="card-date">{evt.Start_Date__c}</span>
                                </div>
                                <div class="card-right">
                                    <span class="budget-amount">${evt.Budget__c}</span>
                                    <div class="card-actions">
                                        <button class="btn-approve" data-id={evt.Id}
                                                onclick={handleApprove}>✓ Approve</button>
                                        <button class="btn-reject" data-id={evt.Id}
                                                onclick={handleReject}>✗ Reject</button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={pendingEvents}>
                    <div class="empty-state">
                        <p>No events pending approval 🎉</p>
                    </div>
                </template>
            </div>
        </template>

        <!-- Draft Events (anyone can submit) -->
        <div class="section">
            <h2 class="section-title">Draft Events — Submit for Approval</h2>
            <template if:true={draftEvents}>
                <div class="approval-list">
                    <template for:each={draftEvents} for:item="evt">
                        <div key={evt.Id} class="approval-card draft">
                            <div class="card-left">
                                <h3>{evt.Name}</h3>
                                <span class="card-type">{evt.Event_Type__c}</span>
                            </div>
                            <div class="card-right">
                                <span class="budget-amount">${evt.Budget__c}</span>
                                <button class="btn-submit" data-id={evt.Id}
                                        onclick={handleSubmit}>Submit</button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={draftEvents}>
                <div class="empty-state">
                    <p>No draft events to submit.</p>
                </div>
            </template>
        </div>

        <!-- Toast -->
        <template if:true={showToast}>
            <div class={toastClass}>{toastMessage}</div>
        </template>
    </div>
</template>
