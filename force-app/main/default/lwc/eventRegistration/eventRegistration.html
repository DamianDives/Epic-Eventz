<template>
    <div class="registration-wrapper">
        <!-- Hero Header -->
        <div class="hero-header">
            <div class="hero-content">
                <h1 class="hero-title">EpicEventz</h1>
                <p class="hero-subtitle">Discover and register for amazing events</p>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-steps">
                <div class={step1Class}>
                    <span class="step-number">1</span>
                    <span class="step-label">Choose Event</span>
                </div>
                <div class="step-line"></div>
                <div class={step2Class}>
                    <span class="step-number">2</span>
                    <span class="step-label">Your Details</span>
                </div>
                <div class="step-line"></div>
                <div class={step3Class}>
                    <span class="step-number">3</span>
                    <span class="step-label">Confirmation</span>
                </div>
            </div>
        </div>

        <!-- Step 1: Event Selection -->
        <template if:true={isStep1}>
            <div class="content-section">
                <h2 class="section-title">Upcoming Events</h2>
                <p class="section-desc">Select an event to register for</p>

                <template if:true={hasEvents}>
                    <div class="events-grid">
                        <template for:each={events} for:item="event">
                            <div key={event.Id} class={event.cardClass}
                                 onclick={handleEventSelect} data-id={event.Id}>
                                <div class="event-card-header">
                                    <span class="event-badge">{event.Event_Type__c}</span>
                                    <span class="event-capacity">{event.seatsInfo}</span>
                                </div>
                                <h3 class="event-card-title">{event.Name}</h3>
                                <div class="event-card-details">
                                    <div class="event-detail-row">
                                        <span class="detail-icon">📍</span>
                                        <span>{event.venueName}</span>
                                    </div>
                                    <div class="event-detail-row">
                                        <span class="detail-icon">📅</span>
                                        <span>{event.formattedDate}</span>
                                    </div>
                                </div>
                                <div class="event-card-footer">
                                    <template if:true={event.isSelected}>
                                        <span class="selected-check">✓ Selected</span>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <template if:false={hasEvents}>
                    <div class="empty-state">
                        <p>No events available at the moment.</p>
                    </div>
                </template>

                <div class="action-bar">
                    <button class="btn btn-primary" disabled={isNextDisabled}
                            onclick={goToStep2}>
                        Continue →
                    </button>
                </div>
            </div>
        </template>

        <!-- Step 2: Attendee Details -->
        <template if:true={isStep2}>
            <div class="content-section">
                <h2 class="section-title">Your Information</h2>
                <p class="section-desc">Tell us about yourself</p>

                <div class="form-container">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Full Name *</label>
                            <input type="text" class="form-input" value={attendeeName}
                                   onchange={handleNameChange} placeholder="John Doe" required/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address *</label>
                            <input type="email" class="form-input" value={email}
                                   onchange={handleEmailChange} placeholder="john@company.com" required/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" class="form-input" value={phone}
                                   onchange={handlePhoneChange} placeholder="+91 98765 43210"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Company</label>
                            <input type="text" class="form-input" value={company}
                                   onchange={handleCompanyChange} placeholder="Your Company"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Registration Amount *</label>
                            <input type="number" class="form-input" value={regAmount}
                                   onchange={handleAmountChange} placeholder="500.00"
                                   step="0.01" min="0" required/>
                        </div>
                    </div>
                </div>

                <div class="action-bar">
                    <button class="btn btn-secondary" onclick={goToStep1}>← Back</button>
                    <button class="btn btn-primary" disabled={isRegisterDisabled}
                            onclick={handleRegister}>
                        <template if:true={isLoading}>Registering...</template>
                        <template if:false={isLoading}>Register Now →</template>
                    </button>
                </div>
            </div>
        </template>

        <!-- Step 3: Confirmation -->
        <template if:true={isStep3}>
            <div class="content-section">
                <template if:true={registrationSuccess}>
                    <div class="success-container">
                        <div class="success-icon">🎉</div>
                        <h2 class="success-title">Registration Successful!</h2>
                        <div class="confirmation-card">
                            <div class="conf-row">
                                <span class="conf-label">Registration #</span>
                                <span class="conf-value">{regNumber}</span>
                            </div>
                            <div class="conf-row">
                                <span class="conf-label">Status</span>
                                <span class={statusClass}>{resultStatus}</span>
                            </div>
                            <template if:true={isWaitlisted}>
                                <div class="conf-row">
                                    <span class="conf-label">Position</span>
                                    <span class="conf-value">#{waitlistPosition}</span>
                                </div>
                                <p class="waitlist-note">
                                    You'll be notified via email when a spot opens up.
                                </p>
                            </template>
                            <template if:false={isWaitlisted}>
                                <p class="confirmed-note">
                                    You're all set! Check your email for details.
                                </p>
                            </template>
                        </div>
                    </div>
                </template>

                <template if:true={registrationError}>
                    <div class="error-container">
                        <div class="error-icon">⚠️</div>
                        <h2 class="error-title">Registration Failed</h2>
                        <p class="error-message">{errorMessage}</p>
                    </div>
                </template>

                <div class="action-bar">
                    <button class="btn btn-primary" onclick={handleReset}>
                        Register for Another Event
                    </button>
                </div>
            </div>
        </template>
    </div>
</template>
