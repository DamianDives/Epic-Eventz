<template>
    <lightning-card title="Event Registration" icon-name="standard:event">
        
        <!-- Step 1: Select Event -->
        <template if:true={isStep1}>
            <div class="slds-p-around_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_medium">Select an Event</h2>
                
                <template if:true={events}>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <template for:each={events} for:item="event">
                            <div key={event.Id} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-m-bottom_medium">
                                <div class={event.cardClass} onclick={handleEventSelect} data-id={event.Id}>
                                    <div class="slds-card__header">
                                        <h3 class="slds-text-heading_small">{event.Name}</h3>
                                    </div>
                                    <div class="slds-card__body slds-card__body_inner">
                                        <p><lightning-icon icon-name="standard:location" size="x-small"></lightning-icon> 
                                            {event.venueName}</p>
                                        <p><lightning-icon icon-name="standard:date_time" size="x-small"></lightning-icon> 
                                            {event.formattedDate}</p>
                                        <p><lightning-icon icon-name="standard:groups" size="x-small"></lightning-icon> 
                                            {event.seatsInfo}</p>
                                        <p class="slds-m-top_x-small">
                                            <lightning-badge label={event.Event_Type__c}></lightning-badge>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
                
                <template if:false={events}>
                    <div class="slds-align_absolute-center slds-m-top_large">
                        <lightning-spinner alternative-text="Loading events"></lightning-spinner>
                    </div>
                </template>
                
                <div class="slds-m-top_medium">
                    <lightning-button label="Next" variant="brand" onclick={goToStep2} disabled={isNextDisabled}></lightning-button>
                </div>
            </div>
        </template>
        
        <!-- Step 2: Attendee Info -->
        <template if:true={isStep2}>
            <div class="slds-p-around_medium">
                <h2 class="slds-text-heading_small slds-m-bottom_medium">Your Information</h2>
                
                <lightning-input label="Full Name" value={attendeeName} onchange={handleNameChange} required class="slds-m-bottom_small"></lightning-input>
                <lightning-input label="Email Address" type="email" value={email} onchange={handleEmailChange} required class="slds-m-bottom_small"></lightning-input>
                <lightning-input label="Phone Number" type="tel" value={phone} onchange={handlePhoneChange} class="slds-m-bottom_small"></lightning-input>
                <lightning-input label="Company" value={company} onchange={handleCompanyChange} class="slds-m-bottom_small"></lightning-input>
                <lightning-input label="Registration Amount" type="number" formatter="currency" step="0.01" value={regAmount} onchange={handleAmountChange} required class="slds-m-bottom_small"></lightning-input>
                
                <div class="slds-m-top_medium">
                    <lightning-button label="Back" onclick={goToStep1} class="slds-m-right_small"></lightning-button>
                    <lightning-button label="Register" variant="brand" onclick={handleRegister} disabled={isRegisterDisabled}></lightning-button>
                </div>
            </div>
        </template>
        
        <!-- Step 3: Result -->
        <template if:true={isStep3}>
            <div class="slds-p-around_medium">
                <template if:true={registrationSuccess}>
                    <div class="slds-box slds-theme_success slds-m-bottom_medium">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="utility:success" variant="inverse" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_small slds-text-color_inverse">Registration Successful!</h2>
                        </div>
                    </div>
                    
                    <div class="slds-box slds-m-bottom_medium">
                        <dl class="slds-dl_horizontal">
                            <dt class="slds-dl_horizontal__label">Registration #:</dt>
                            <dd class="slds-dl_horizontal__detail">{regNumber}</dd>
                            <dt class="slds-dl_horizontal__label">Status:</dt>
                            <dd class="slds-dl_horizontal__detail">
                                <lightning-badge label={resultStatus} class={statusBadgeClass}></lightning-badge>
                            </dd>
                            <template if:true={isWaitlisted}>
                                <dt class="slds-dl_horizontal__label">Waitlist Position:</dt>
                                <dd class="slds-dl_horizontal__detail">{waitlistPosition}</dd>
                            </template>
                        </dl>
                    </div>
                    
                    <template if:true={isWaitlisted}>
                        <p class="slds-text-body_regular slds-m-bottom_medium">
                            You've been added to the waitlist. We'll notify you via email if a spot opens up!
                        </p>
                    </template>
                    <template if:false={isWaitlisted}>
                        <p class="slds-text-body_regular slds-m-bottom_medium">
                            You're confirmed! See you at the event.
                        </p>
                    </template>
                </template>
                
                <template if:true={registrationError}>
                    <div class="slds-box slds-theme_error slds-m-bottom_medium">
                        <div class="slds-grid slds-grid_vertical-align-center">
                            <lightning-icon icon-name="utility:error" variant="inverse" size="small" class="slds-m-right_small"></lightning-icon>
                            <h2 class="slds-text-heading_small slds-text-color_inverse">Registration Failed</h2>
                        </div>
                    </div>
                    <p class="slds-text-body_regular">{errorMessage}</p>
                </template>
                
                <div class="slds-m-top_medium">
                    <lightning-button label="Register Another" variant="brand" onclick={handleReset}></lightning-button>
                </div>
            </div>
        </template>
        
        <!-- Loading spinner -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Processing" size="medium"></lightning-spinner>
        </template>
    </lightning-card>
</template>
