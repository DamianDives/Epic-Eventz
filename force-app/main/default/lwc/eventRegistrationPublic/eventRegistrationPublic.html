<template>
    <div class="epic-container">
        <!-- Hero -->
        <div class="hero">
            <h1>🎯 EpicEventz</h1>
            <p>Discover amazing events. Register instantly.</p>
        </div>

        <!-- Events Grid -->
        <div class="content">
            <h2 class="heading">Upcoming Events</h2>

            <template if:true={hasEvents}>
                <div class="grid">
                    <template for:each={events} for:item="evt">
                        <div key={evt.Id} class="card">
                            <div class="card-head">
                                <span class="type-badge">{evt.Event_Type__c}</span>
                                <span class="seats">{evt.seatsInfo}</span>
                            </div>
                            <h3 class="card-name">{evt.Name}</h3>
                            <p class="card-detail">📍 {evt.venueName}</p>
                            <p class="card-detail">📅 {evt.formattedDate}</p>
                            <button class="btn-register" data-id={evt.Id}
                                    onclick={handleRegisterClick}>
                                Register Now →
                            </button>
                        </div>
                    </template>
                </div>
            </template>

            <template if:false={hasEvents}>
                <p class="empty">No events available right now.</p>
            </template>
        </div>
    </div>
</template>
