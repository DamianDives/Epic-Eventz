<template>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">EpicEventz</h1>
                <p class="auth-tagline">{headerSubtext}</p>
            </div>

            <!-- Login Form — real HTML form POST to the site's native login
                 handler (not an Apex/@AuraEnabled call). Site.login() cannot
                 set the session cookie correctly when invoked over the
                 LWC/UI-API remoting layer, so we submit a genuine browser
                 form post to /login here, exactly like the standard login
                 page does under the hood. -->
            <template if:true={isLoginMode}>
                <form class="auth-form" method="post" action={loginActionUrl}>
                    <input type="hidden" name="startURL" value={startUrl} />
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" name="un" class="form-input" value={email}
                               onchange={handleEmailChange} placeholder="you@email.com" required/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" name="pw" class="form-input" value={password}
                               onchange={handlePasswordChange} placeholder="••••••••" required/>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full"
                            disabled={isLoading}>
                        <template if:true={isLoading}>Logging in...</template>
                        <template if:false={isLoading}>Log In</template>
                    </button>
                    <p class="auth-switch">
                        Don't have an account?
                        <a class="auth-link" onclick={switchToSignup}>Sign Up</a>
                    </p>
                </form>
            </template>

            <!-- Signup Form -->
            <template if:true={isSignupMode}>
                <div class="auth-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-input" value={firstName}
                                   onchange={handleFirstNameChange} placeholder="John"/>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-input" value={lastName}
                                   onchange={handleLastNameChange} placeholder="Doe"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" value={email}
                               onchange={handleEmailChange} placeholder="you@email.com"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password (min 8 characters)</label>
                        <input type="password" class="form-input" value={password}
                               onchange={handlePasswordChange} placeholder="••••••••"/>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" class="form-input" value={confirmPassword}
                               onchange={handleConfirmPasswordChange} placeholder="••••••••"/>
                    </div>
                    <button class="btn btn-primary btn-full" onclick={handleSignup}
                            disabled={isLoading}>
                        <template if:true={isLoading}>Creating Account...</template>
                        <template if:false={isLoading}>Create Account</template>
                    </button>
                    <p class="auth-switch">
                        Already have an account?
                        <a class="auth-link" onclick={switchToLogin}>Log In</a>
                    </p>
                </div>
            </template>

            <!-- Success Message -->
            <template if:true={showSuccess}>
                <div class="success-box">
                    <span class="success-icon">✓</span>
                    <p>{successMessage}</p>
                </div>
            </template>

            <!-- Error Message -->
            <template if:true={showError}>
                <div class="error-box">
                    <p>{errorMessage}</p>
                </div>
            </template>
        </div>
    </div>
</template>
