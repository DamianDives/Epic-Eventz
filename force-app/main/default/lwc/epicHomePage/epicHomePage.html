<template>
    <div class="page">
        <!-- STICKY NAV -->
        <nav class="navbar">
            <span class="nav-logo">EE<span class="nav-dot">.</span></span>
            <div class="nav-links">
                <span class="nav-link" onclick={scrollToEvents}>Events</span>
                <span class="nav-link" onclick={scrollToAbout}>About</span>
            </div>
            <button class="nav-signin" onclick={goToLogin}>Member Login</button>
        </nav>

        <!-- SPLIT HERO -->
        <div class="hero">
            <div class="hero-left">
                <span class="hero-kicker">EVENT MANAGEMENT, SIMPLIFIED</span>
                <h1 class="hero-headline">
                    Find it.<br/>
                    Book it.<br/>
                    <span class="hero-underline">Show up.</span>
                </h1>
                <p class="hero-copy">
                    No spreadsheets. No confusion. Just a clean way to
                    discover events and lock in your spot.
                </p>
                <button class="btn-coral" onclick={scrollToEvents}>See what's on →</button>
            </div>
            <div class="hero-right">
                <template if:true={heroPreview}>
                    <div class="stack-card stack-card-1">
                        <span class="stack-tag">{heroPreview.Event_Type__c}</span>
                        <h4>{heroPreview.Name}</h4>
                        <p>{heroPreview.venueName}</p>
                    </div>
                </template>
                <div class="stack-card stack-card-2"></div>
                <div class="stack-card stack-card-3"></div>
            </div>
        </div>

        <!-- STATS STRIP -->
        <div class="stats-strip">
            <div class="stat"><strong>{eventCount}</strong><span>Live Events</span></div>
            <div class="stat-divider"></div>
            <div class="stat"><strong>Instant</strong><span>Confirmation</span></div>
            <div class="stat-divider"></div>
            <div class="stat"><strong>Auto</strong><span>Waitlisting</span></div>
        </div>

        <!-- EVENTS: FILTERABLE GRID -->
        <div class="events-block" data-id="events-anchor">
            <div class="events-block-head">
                <h2>What's <em>on</em></h2>
                <div class="filter-chips">
                    <template for:each={typeFilters} for:item="f">
                        <span key={f.value} class={f.chipClass}
                              data-value={f.value} onclick={handleFilterClick}>
                            {f.label}
                        </span>
                    </template>
                </div>
            </div>

            <template if:true={hasFilteredEvents}>
                <div class="masonry">
                    <template for:each={filteredEvents} for:item="evt">
                        <article key={evt.Id} class="event-tile" data-id={evt.Id}
                                 onclick={handleEventTileClick}>
                            <div class="tile-top">
                                <span class="tile-type">{evt.Event_Type__c}</span>
                                <span class="tile-seats">{evt.seatsInfo}</span>
                            </div>
                            <h3 class="tile-name">{evt.Name}</h3>
                            <p class="tile-date">{evt.formattedDate}</p>
                            <p class="tile-venue">{evt.venueName}</p>
                            <span class="tile-cta">Lock in a spot ↗</span>
                        </article>
                    </template>
                </div>
            </template>
            <template if:false={hasFilteredEvents}>
                <p class="empty-copy">Nothing here yet — try another filter.</p>
            </template>
        </div>

        <!-- HORIZONTAL TIMELINE -->
        <div class="timeline-block" data-id="about-anchor">
            <h2 class="timeline-heading">From click to <em>check-in</em></h2>
            <div class="timeline">
                <div class="timeline-node">
                    <span class="node-dot"></span>
                    <span class="node-label">Browse</span>
                    <p>Skim what's happening, filter by type.</p>
                </div>
                <div class="timeline-node">
                    <span class="node-dot"></span>
                    <span class="node-label">Sign in</span>
                    <p>Quick account, or jump right back in.</p>
                </div>
                <div class="timeline-node">
                    <span class="node-dot"></span>
                    <span class="node-label">Confirm</span>
                    <p>Capacity checked instantly — in or waitlisted.</p>
                </div>
                <div class="timeline-node">
                    <span class="node-dot"></span>
                    <span class="node-label">Attend</span>
                    <p>That's it. See you there.</p>
                </div>
            </div>
        </div>

        <!-- CLOSING BANNER -->
        <div class="closing">
            <h2>Your next event is one click away.</h2>
            <button class="btn-coral-outline" onclick={goToLogin}>Get started →</button>
        </div>
    </div>
</template>
